services:
  agent:
    build: .
    container_name: rs_agent_db
    env_file:
      .env
    healthcheck:
      test: [ "CMD", "python", "health_check.py" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./logs:/rsagent_db/logs
    restart: always
    network_mode: "host"